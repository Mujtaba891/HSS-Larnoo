
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Event Sender - HSS Larnoo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --bg-dark: #1a1c23;
            --bg-med: #252830;
            --bg-light: #313540;
            --border-color: #444857;
            --text-primary: #f0f2f5;
            --text-secondary: #a0a8b4;
            --gov-blue: #003366;
            --gov-orange: #FF9933;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 0; overflow-x: hidden; }
        
        .layout-container { display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
        
        .panel { padding: 30px; overflow-y: auto; }
        .panel-form { width: 480px; background: var(--bg-med); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .panel-preview { flex-grow: 1; background: #121417; display: flex; flex-direction: column; }

        @media (max-width: 1200px) {
            .panel-form { width: 400px; }
        }

        @media (max-width: 992px) {
            .layout-container { flex-direction: column; height: auto; overflow: visible; }
            .panel-form { width: 100%; border: none; height: auto; padding: 20px; }
            .panel-preview { width: 100%; height: 600px; border-top: 1px solid var(--border-color); }
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--gov-orange); }
        h1 { font-size: 1.2rem; margin: 0; color: white; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        h2 { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .form-section { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary-color); font-weight: 700; margin-bottom: 15px; display: block; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-secondary); font-size: 0.85rem; }
        textarea, input[type="text"], input[type="email"], select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-dark); color: var(--text-primary); transition: all 0.2s; }
        textarea:focus, input:focus, select:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.2); }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: white; }
        .btn-primary { background-color: var(--primary-color); }
        .btn-primary:hover { background-color: #0069d9; transform: translateY(-1px); }
        .btn-success { background-color: var(--success-color); box-shadow: 0 4px 12px rgba(40,167,69,0.2); }
        .btn-success:hover { background-color: #218838; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); color: white; }
        .btn:disabled { background-color: #444 !important; color: #888 !important; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
        
        #status-container { margin-top: auto; padding-top: 20px; }
        .progress-wrapper { background-color: var(--bg-light); border-radius: 10px; overflow: hidden; height: 10px; margin-top: 10px; display: none; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--primary-color), var(--success-color)); transition: width 0.3s ease; }
        
        .preview-header { padding: 15px 25px; background: var(--bg-med); border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        #email-preview { flex-grow: 1; width: 100%; border: none; background: white; }
        
        .back-link { color: var(--text-secondary); text-decoration: none; font-weight: 500; font-size: 0.85rem; transition: 0.2s; }
        .back-link:hover { color: white; }
        
        .test-input-group { display: flex; gap: 8px; }
        .test-input-group input { margin-bottom: 0; flex-grow: 1; }
        .test-input-group .btn { width: auto; white-space: nowrap; padding: 0 20px; }

        .alert { padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem; display: none; animation: fadeIn 0.3s; }
        .alert-error { background: rgba(220, 53, 69, 0.1); color: #ff808b; border: 1px solid rgba(220, 53, 69, 0.3); }
        .alert-success { background: rgba(40, 167, 69, 0.1); color: #72db8b; border: 1px solid rgba(40, 167, 69, 0.3); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .device-toggle { display: flex; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 3px; }
        .device-btn { background: transparent; border: none; color: #666; padding: 5px 10px; border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .device-btn.active { background: var(--primary-color); color: white; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="layout-container">
        <!-- Left Side: Controls -->
        <div class="panel panel-form">
            <div class="header">
                <h1>Email Broadcast</h1>
                <a href="canvas.html" class="back-link"><i class="fas fa-edit"></i> Edit Design</a>
            </div>
            
            <h2 id="subscriber-count"><i class="fas fa-circle-notch fa-spin"></i> Loading subscribers...</h2>
            
            <div id="main-alert" class="alert"></div>

            <div class="form-section">
                <span class="section-title">Message Details</span>
                <label for="email-subject">Subject Line</label>
                <input type="text" id="email-subject" placeholder="e.g., Important Update from HSS Larnoo">
                
                <label for="subject-preset">Quick Templates</label>
                <select id="subject-preset" onchange="applySubject(this.value)">
                    <option value="">-- Choose a template --</option>
                    <option value="Weekly Newsletter - HSS Larnoo">Weekly Newsletter</option>
                    <option value="Important Notice: Upcoming Events">Important Notice</option>
                    <option value="Monthly Academic Highlights">Academic Highlights</option>
                    <option value="Admission Open for Session 2024-25">Admission Alert</option>
                </select>

                <label for="email-body">HTML Content (Read Only)</label>
                <textarea id="email-body" rows="4" readonly style="opacity: 0.6; font-family: monospace; font-size: 11px;"></textarea>
            </div>

            <div class="form-section">
                <span class="section-title">Test Delivery</span>
                <div class="test-input-group">
                    <input type="email" id="test-email-address" placeholder="recipient@example.com">
                    <button id="test-send-btn" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Test</button>
                </div>
                <p style="font-size: 11px; color: var(--text-secondary); margin-top: 10px; margin-bottom: 0;">Highly recommended before broadcasting to all.</p>
            </div>

            <div id="status-container">
                <button id="send-btn" class="btn btn-success" style="height: 55px; font-size: 1rem; margin-bottom: 15px;">
                    <i class="fas fa-rocket"></i> START BROADCAST
                </button>
                
                <p id="status-text" style="margin: 0; font-size: 0.8rem; color: var(--text-secondary); text-align: center;">System Ready</p>
                <div class="progress-wrapper" id="progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>
        </div>
        
        <!-- Right Side: Preview -->
        <div class="panel panel-preview">
            <div class="preview-header">
                <h3 style="margin: 0; font-size: 0.9rem; font-weight: 700;"><i class="fas fa-eye" style="color: var(--primary-color);"></i> Final Preview</h3>
                
                <div class="device-toggle">
                    <button class="device-btn active" onclick="setPreviewDevice('100%', this)"><i class="fas fa-desktop"></i></button>
                    <button class="device-btn" onclick="setPreviewDevice('768px', this)"><i class="fas fa-tablet-alt"></i></button>
                    <button class="device-btn" onclick="setPreviewDevice('375px', this)"><i class="fas fa-mobile-alt"></i></button>
                </div>
            </div>
            <div style="flex-grow: 1; display: flex; justify-content: center; background: #121417; padding: 20px; overflow: hidden;">
                <iframe id="email-preview" title="Email Preview" style="box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 4px; transition: width 0.3s ease; height: 100%; width: 100%;"></iframe>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAUBnBW_wcY3evdk4ilKVyvufkkYo6rIU",
            authDomain: "hss-larnoo-teachers.firebaseapp.com",
            projectId: "hss-larnoo-teachers",
            storageBucket: "hss-larnoo-teachers.appspot.com",
            messagingSenderId: "143363278401",
            appId: "1:143363278401:web:49d7fffbdf31ce073e68c0"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // EmailJS Configuration
        const EMAILJS_SERVICE_ID = 'service_01cuq2o';
        const EMAILJS_TEMPLATE_ID = 'template_jgdd2wl';
        const EMAILJS_PUBLIC_KEY = '0Q7acQc7s1VPBgO9_';

        const emailBody = document.getElementById('email-body');
        const previewFrame = document.getElementById('email-preview');
        const mainAlert = document.getElementById('main-alert');
        
        window.applySubject = (val) => {
            if (val) document.getElementById('email-subject').value = val;
        };

        window.setPreviewDevice = (width, btn) => {
            previewFrame.style.width = width;
            document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        function showAlert(msg, type = 'success') {
            mainAlert.textContent = msg;
            mainAlert.className = `alert alert-${type}`;
            mainAlert.style.display = 'block';
            setTimeout(() => mainAlert.style.display = 'none', 8000);
        }

        function updatePreview() {
            const content = emailBody.value || '<div style="padding: 100px 20px; text-align: center; font-family: sans-serif; color: #999;"><h3>No Design Loaded</h3><p>Please go back to the builder and save your design.</p></div>';
            previewFrame.srcdoc = content;
        }
        
        async function initialize() {
            try {
                emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
                
                const savedHtml = localStorage.getItem('newsletterHtml');
                if (savedHtml) {
                    emailBody.value = savedHtml;
                    updatePreview();
                } else {
                    updatePreview();
                    showAlert("No newsletter draft found. Please create one in the builder first.", "edge");
                }

                const querySnapshot = await getDocs(collection(db, "newsletter_subscribers"));
                const subscribers = querySnapshot.docs.map(doc => doc.data().email).filter(e => e && e.includes('@'));
                document.getElementById('subscriber-count').innerHTML = `<i class="fas fa-users" style="color: var(--success-color);"></i> ${subscribers.length} Active Subscribers`;
                window.subscribers = [...new Set(subscribers)]; // Remove duplicates
            } catch (error) {
                document.getElementById('subscriber-count').textContent = 'Initialization Failed';
                showAlert(`System Error: ${error.message}`, 'error');
            }
        }

        initialize();

        // Test Send Logic
        document.getElementById('test-send-btn').addEventListener('click', async () => {
             const testEmail = document.getElementById('test-email-address').value;
             if (!testEmail) { showAlert('Enter a recipient email address.', 'error'); return; }
             
             const subject = document.getElementById('email-subject').value || "Newsletter Test - HSS Larnoo";
             const html_content = emailBody.value;
             if (!html_content) { showAlert('No content to send.', 'error'); return; }

             const btn = document.getElementById('test-send-btn');
             const originalText = btn.innerHTML;
             btn.disabled = true;
             btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i>`;
             
             try {
                await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { 
                    subject: subject, 
                    html_content: html_content, 
                    to_email: testEmail 
                });
                showAlert(`Success! Test email delivered to ${testEmail}`);
             } catch (error) {
                console.error("EmailJS Error:", error);
                showAlert(`Delivery Failed: ${error.text || 'Check connection'}`, 'error');
             } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
             }
        });


        // Bulk Send Logic
        document.getElementById('send-btn').addEventListener('click', async () => {
            if (!window.subscribers || window.subscribers.length === 0) {
                showAlert('No subscriber list available.', 'error');
                return;
            }

            const subject = document.getElementById('email-subject').value;
            const html_content = emailBody.value;
            if (!subject || !html_content) { 
                showAlert('Subject line and content are both required.', 'error'); 
                return; 
            }

            if (!confirm(`FINAL CONFIRMATION:\n\nThis will send a broadcast to ${window.subscribers.length} subscribers. Continue?`)) return;

             const sendBtn = document.getElementById('send-btn');
             const statusText = document.getElementById('status-text');
             const progressBar = document.getElementById('progress-bar');
             const progressFill = document.getElementById('progress-fill');

             sendBtn.disabled = true;
             progressBar.style.display = 'block';
             progressFill.style.width = '0%';
             let emailsSent = 0;
             let emailsFailed = 0;

            for (const email of window.subscribers) {
                 try {
                    statusText.textContent = `Sending to: ${email}...`;
                    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { 
                        subject: subject, 
                        html_content: html_content, 
                        to_email: email 
                    });
                    emailsSent++;
                 } catch(err) {
                    console.error(`Failed to send to ${email}:`, err);
                    emailsFailed++;
                 }
                 
                 const totalProcessed = emailsSent + emailsFailed;
                 const percent = (totalProcessed / window.subscribers.length) * 100;
                 progressFill.style.width = `${percent}%`;
                 statusText.textContent = `Progress: ${totalProcessed} / ${window.subscribers.length} (${emailsSent} sent, ${emailsFailed} failed)`;
                 
                 // Artificial delay to prevent aggressive rate limiting
                 await new Promise(r => setTimeout(r, 400));
            }
            
            statusText.textContent = `Broadcast Complete! Sent: ${emailsSent}, Failed: ${emailsFailed}`;
            showAlert(`Broadcast finished. Check the status log for details.`);
            sendBtn.innerHTML = `<i class="fas fa-check"></i> BROADCAST FINISHED`;
        });

    </script>
</body>
</html>
