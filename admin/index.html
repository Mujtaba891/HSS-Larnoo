<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | HSS Larnoo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/gov-style.css">
    
    <!-- PWA Manifest & Mobile Icons -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#003366">
    <link rel="apple-touch-icon" href="../img/logo3.png">
</head>
<body>
    <div id="app">
        <!-- SPA content will be injected here -->
        <div class="text-center" style="margin-top: 100px;">
            <i class="fas fa-circle-notch fa-spin fa-3x" style="color: #003366;"></i>
            <p>Initializing Admin Portal...</p>
        </div>
    </div>

    <!-- Modals (Persistent) -->
    <div id="gov-modal" class="gov-modal">
        <div class="gov-modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/app.js"></script>
    
    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('🛡️ Admin PWA: Service Worker Registered'))
                    .catch(err => console.log('❌ Admin PWA: Registration Failed', err));
            });
        }
    </script>
</body>
</html>
